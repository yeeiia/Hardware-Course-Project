dataset: mnist
model: tinycnn_mnist
rounds: 10
num_clients: 2
batch_size: 16
local_epochs: 1
seed: 42
device: cpu
partition:
  type: dirichlet
  dirichlet_alpha: 0.3
  quantity_ratios:
  - 0.7
  - 0.3
data:
  root: null
  train_limit: 10000
  test_limit: 1000
  synthetic: false
server:
  host: 0.0.0.0
  bind_host: 0.0.0.0
  port: 9000
  min_clients: 2
  timeout_seconds: 900
run:
  dir: runs
  name: pi
  save_every_round: true
lr: 0.05
