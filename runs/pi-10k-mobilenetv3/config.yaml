dataset: cifar10
model: mobilenetv3_cifar
rounds: 3
num_clients: 2
batch_size: 32
local_epochs: 3
seed: 42
device: cuda
partition:
  type: iid
  dirichlet_alpha: 0.3
  quantity_ratios:
  - 0.5
  - 0.5
data:
  root: null
  train_limit: 10000
  test_limit: 2000
  synthetic: false
server:
  host: 0.0.0.0
  bind_host: 0.0.0.0
  port: 9000
  min_clients: 2
  timeout_seconds: 14400
run:
  dir: runs
  name: pi-10k-mobilenetv3
  save_every_round: true
  early_stop_patience: 5
  early_stop_min_delta: 0.001
lr: 0.0291
momentum: 0.9
weight_decay: 0.0
optimizer: sgd
