dataset: cifar10
model: dscnn_cifar
rounds: 3
num_clients: 2
batch_size: 16
local_epochs: 1
seed: 42
device: cuda
partition:
  type: iid
  dirichlet_alpha: 0.3
  quantity_ratios:
  - 0.5
  - 0.5
data:
  root: null
  train_limit: 10000
  test_limit: 2000
  synthetic: false
server:
  host: 0.0.0.0
  bind_host: 0.0.0.0
  port: 9000
  min_clients: 2
  timeout_seconds: 600
run:
  dir: runs
  name: pi-demo-cifar10
  save_every_round: true
lr: 0.05
