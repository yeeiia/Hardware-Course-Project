dataset: mnist
model: tinycnn_mnist
rounds: 20
num_clients: 2
batch_size: 64
local_epochs: 4
seed: 42
device: cuda
partition:
  type: dirichlet
  dirichlet_alpha: 0.3
  quantity_ratios:
  - 0.5
  - 0.5
data:
  root: null
  train_limit: 10000
  test_limit: 2000
  synthetic: false
server:
  host: 127.0.0.1
  bind_host: 127.0.0.1
  port: 9000
  min_clients: 2
  timeout_seconds: 600
run:
  dir: runs
  name: mnist-e4-a0.3
  save_every_round: true
  early_stop_patience: 0
  early_stop_min_delta: 0.001
lr: 0.008168
momentum: 0.601
weight_decay: 4.81e-06
optimizer: sgd
