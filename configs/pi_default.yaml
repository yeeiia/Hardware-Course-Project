# Raspberry Pi FedAvg server config.
# This file is the source of truth for the experiment. The server sends the
# training/data/model fields below to all clients in GLOBAL_MODEL messages.

# Dataset options:
#   mnist  -> use model tinycnn_mnist
#   cifar10 -> use model dscnn_cifar or simplecnn_cifar
dataset: mnist

# Model options:
#   tinycnn_mnist   -> lightweight CNN for MNIST
#   dscnn_cifar     -> depthwise-separable CNN for CIFAR-10, Pi-friendly
#   simplecnn_cifar -> larger plain CNN baseline for CIFAR-10
model: tinycnn_mnist

# Number of communication rounds. Each round sends the global model to every
# client, waits for one local update from each client, then aggregates once.
rounds: 10

# Number of clients expected by the server. Client indexes must be 0..num_clients-1.
num_clients: 2

# FedAvg B: local mini-batch size used on each client.
batch_size: 16

# FedAvg E: number of full local epochs each client runs per communication round.
local_epochs: 1

# Random seed used for model init, synthetic data, shuffling, and partitioning.
# Keep this fixed when comparing experiments.
seed: 42

# Server evaluation device. Pi clients use their own local configs/pi_client.yaml
# device field, while training parameters come from this file.
# Options commonly used here: cpu, cuda
device: cpu

# Client optimizer learning rate. Current training code uses SGD(momentum=0.9).
lr: 0.05

# Data partitioning across clients:
#   iid           -> balanced label distribution on each client
#   dirichlet     -> label-skew non-IID; smaller dirichlet_alpha means more skew
#   quantity_skew -> same label distribution but different sample counts
partition:
  type: dirichlet
  # Used only when type: dirichlet. Typical values: 0.1, 0.3, 1.0.
  dirichlet_alpha: 0.3
  # Used only when type: quantity_skew. Values are normalized if needed.
  # For two clients, [0.7, 0.3] means client0 gets about 70% of training samples.
  quantity_ratios: [0.7, 0.3]

data:
  # false -> load the real dataset through Hugging Face datasets
  # true  -> generate synthetic tensors locally; useful for fast protocol tests
  synthetic: false

  # Total training samples used for the whole experiment before partitioning.
  # This is not "per round". Use null to use the full training split.
  train_limit: 10000

  # Test samples used by the server for evaluation every round.
  # Use null to use the full test split.
  test_limit: 1000

server:
  # Informational/public host value. For the server process itself, bind_host
  # controls the actual listening address. Clients use configs/pi_client.yaml.
  host: 0.0.0.0

  # Address to listen on:
  #   0.0.0.0   -> listen on all network interfaces, needed for real Pi clients
  #   127.0.0.1 -> local-only debugging
  bind_host: 0.0.0.0

  # TCP port used by both server and Pi clients.
  port: 9000

  # Minimum clients required before training can proceed. Usually equals num_clients.
  min_clients: 2

  # Socket timeout in seconds for accept/connect/recv operations.
  # Increase this when Pi data loading or training is slow.
  timeout_seconds: 900

run:
  # Output root directory. Each run writes config, metrics, checkpoints, and figures here.
  dir: runs

  # Run subdirectory name. Set to null to auto-generate a timestamped name.
  name: pi

  # true -> save global_round_XXX.pt each round; false -> metrics/figures only.
  save_every_round: true
