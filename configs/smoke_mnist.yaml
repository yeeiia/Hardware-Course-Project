dataset: mnist
model: tinycnn_mnist
rounds: 2
num_clients: 2
batch_size: 16
local_epochs: 1
seed: 42
device: cpu
lr: 0.05
partition:
  type: iid
  dirichlet_alpha: 0.3
  quantity_ratios: [0.7, 0.3]
data:
  synthetic: true
  train_limit: 128
  test_limit: 64
server:
  host: 127.0.0.1
  bind_host: 127.0.0.1
  port: 9000
  min_clients: 2
  timeout_seconds: 120
run:
  dir: runs
  name: smoke-mnist
  save_every_round: true
