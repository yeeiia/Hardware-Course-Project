# MNIST TinyCNN, α=0.3, E=8 — communication efficiency vs local epochs
dataset: mnist
model: tinycnn_mnist
rounds: 20
num_clients: 2
batch_size: 64
local_epochs: 8
seed: 42
device: cuda
lr: 0.008168
momentum: 0.601
weight_decay: 0.00000481
optimizer: sgd
partition:
  type: dirichlet
  dirichlet_alpha: 0.3
  quantity_ratios: [0.5, 0.5]
data:
  synthetic: false
  train_limit: 10000
  test_limit: 2000
server:
  host: 127.0.0.1
  bind_host: 127.0.0.1
  port: 9000
  min_clients: 2
  timeout_seconds: 600
run:
  dir: runs
  name: mnist-e8-a0.3
  save_every_round: true
  early_stop_patience: 0
